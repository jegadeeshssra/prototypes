<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products List</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        #products-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-card {
            background: #334155;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-details {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #10b981;
        }

        .loading, .error {
            text-align: center;
            font-size: 1.1rem;
            padding: 2rem;
        }

        .error {
            color: #ef4444;
        }
        
        .raw-json {
            margin-top: 1rem;
            margin-bottom: 1rem;
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            color: #a7f3d0;
            font-family: 'Courier New', Courier, monospace;
            display: none;
        }
        
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background-color 0.2s;
        }
        
        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Product Inventory</h1>
        <button id="toggle-json-btn">Show Raw JSON</button>
        <pre id="raw-json" class="raw-json"></pre>
        <div id="products-container">
            <div class="loading">Loading products...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
